<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- 外框 - 工坊/画框形状 -->
  <rect x="2" y="2" width="28" height="28" rx="4" stroke="white" stroke-width="2" fill="none"/>
  
  <!-- 画笔形状 - 斜向 -->
  <path d="M8 24L20 12" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M20 12L24 8" stroke="white" stroke-width="2" stroke-linecap="round"/>
  
  <!-- 画笔笔尖 -->
  <circle cx="24" cy="8" r="2" fill="white"/>
  
  <!-- 星星/创意火花 -->
  <path d="M12 8L12.5 10L14.5 10L13 11.2L13.5 13L12 12L10.5 13L11 11.2L9.5 10L11.5 10Z" fill="white"/>
  
  <!-- 色块/调色板点 -->
  <circle cx="24" cy="20" r="2" fill="white"/>
  <circle cx="20" cy="24" r="1.5" fill="white"/>
</svg>
